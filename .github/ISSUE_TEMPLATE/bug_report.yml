name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what went wrong?
      placeholder: "e.g., `kuku list` shows no sessions on Windows even after running a session"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, starting from a clean state if possible
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste terminal output, logs, or screenshots.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, and version info
      value: |
        - OS:
        - Shell:
        - kuku version:
        - rustc version:
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — related issues, suspicions about root cause, workarounds tried
