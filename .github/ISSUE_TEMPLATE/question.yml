name: Question
description: Ask a question about using or developing kuku
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Usage help
        - Configuration
        - Development / contributing
        - Architecture / design
        - Other

  - type: textarea
    id: tried
    attributes:
      label: What I've tried
      description: Docs you've read, experiments you've attempted, what you already understand
      placeholder: |
        - kuku version:
        - OS:
        - What I tried:
