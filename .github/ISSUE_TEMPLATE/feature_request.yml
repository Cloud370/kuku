name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this solve? Who benefits?
      placeholder: "As a [user], I want [goal] so that [reason]..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would the feature look like? Be specific enough to evaluate feasibility.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, rejected approaches, or why this approach over others

  - type: dropdown
    id: scope
    attributes:
      label: Affected scope
      description: Which part of kuku would this touch?
      options:
        - "SDK"
        - "CLI"
        - "Server"
        - "SDK + CLI"
        - "SDK + CLI + Server"
        - "Other"
