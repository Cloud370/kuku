name: WebUI CI
on:
  push:
    paths: ["apps/web/**"]

concurrency:
  group: webui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run typecheck
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web

  test:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
