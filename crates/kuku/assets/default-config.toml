# kuku configuration
# Generated by kuku init. Modify as needed.

default_model = "balanced"

[model.strong]
provider = "anthropic"
model = "claude-sonnet-4-6"
think = "high"
context_window = 200000
max_output_tokens = 64000
purpose = "deep reasoning, complex analysis"

[model.balanced]
provider = "anthropic"
model = "claude-sonnet-4-6"
think = "medium"
context_window = 200000
max_output_tokens = 48000
purpose = "general purpose, everyday tasks"

[model.light]
provider = "anthropic"
model = "claude-haiku-4-5"
think = "off"
context_window = 200000
max_output_tokens = 32000
purpose = "quick simple tasks, summaries"

[provider.anthropic]
format = "anthropic"
base_url = "https://api.anthropic.com"
api_key = "$ANTHROPIC_API_KEY"

[provider.openai]
format = "openai-responses"
base_url = "https://api.openai.com/v1"
api_key = "$OPENAI_API_KEY"

# Auto-discovery: scan standard directories for skills and agents.
[discovery]
auto_discover = true
# extra_user_paths = ["/opt/shared/agents"]
# extra_project_paths = [".custom/agents"]

# Context handoff: inject summary when context usage exceeds threshold.
[handoff]
enabled = true
threshold = 0.7          # 0.0–1.0, triggers handoff at this usage ratio
keep_turns = 2           # recent turns preserved after handoff
