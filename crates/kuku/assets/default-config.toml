# kuku configuration
# Generated by kuku init. Modify as needed.
#
# This file defines three things:
#   1. Model tiers — which AI model to use for different task complexities
#   2. Providers — API credentials and endpoints for each AI service
#   3. Behavior — auto-discovery of skills/agents, context handoff settings

# The tier used when no tier is explicitly specified. One of: strong, balanced, light.
default_model = "balanced"

# ── Model tiers ───────────────────────────────────────────────────────────────
# Each tier maps to a provider, model, and thinking level.
# Required tiers: strong, balanced, light. You can add custom tiers too.
#
# think: "off" (fastest) → "low" → "medium" → "high" (deepest reasoning)
# context_window: max input tokens the model accepts (check your provider's limits)
# max_output_tokens: max tokens the model can generate in one response

# strong: deep reasoning for complex analysis, architecture, and debugging.
[model.strong]
provider = "anthropic"
model = "claude-sonnet-4-6"
think = "high"
context_window = 200000
max_output_tokens = 64000
purpose = "deep reasoning, complex analysis"

# balanced: general-purpose everyday tasks (default tier).
[model.balanced]
provider = "anthropic"
model = "claude-sonnet-4-6"
think = "medium"
context_window = 200000
max_output_tokens = 48000
purpose = "general purpose, everyday tasks"

# light: fast, cheap tasks — summaries, formatting, simple lookups.
[model.light]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
think = "off"
context_window = 200000
max_output_tokens = 32000
purpose = "quick simple tasks, summaries"

# ── Providers ─────────────────────────────────────────────────────────────────
# Define API endpoints and credentials. Tiers reference providers by name.
#
# format: protocol adapter — "anthropic", "openai-chat", or "openai-responses"
# api_key: your API key, or "$ENV_VAR_NAME" to read from environment variable

[provider.anthropic]
format = "anthropic"
base_url = "https://api.anthropic.com"
api_key = "$ANTHROPIC_API_KEY"

[provider.openai]
format = "openai-responses"
base_url = "https://api.openai.com"
api_key = "$OPENAI_API_KEY"

# ── Auto-discovery ────────────────────────────────────────────────────────────
# Auto-scan for skills/ and agents/ subdirectories in:
#   User-level:  ~/.config/*/ and ~/.* (dot dirs, excluding .cache/.cargo/.ssh etc.)
#   Project-level: workspace/.* (e.g. .claude/skills, .opencode/agents)

[discovery]
auto_discover = true
# extra_user_paths = ["/opt/shared/agents"]    # additional user-level paths
# extra_project_paths = [".custom/agents"]     # additional project-level paths

# ── Context handoff ───────────────────────────────────────────────────────────
# When context usage exceeds the threshold, inject a summary of earlier turns
# so the model retains continuity without running out of context window.

[handoff]
enabled = true
threshold = 0.7          # 0.0–1.0, triggers handoff at this context usage ratio
keep_turns = 2           # number of recent turns preserved after handoff

# ── Plugin system ─────────────────────────────────────────────────────────────
# Enable hook execution from .kuku/packages/ extension packages.
# Hooks are external processes that run at lifecycle events (session start/end,
# tool execution, model requests). Packages can also bundle skills.

[plugin]
enabled = true
