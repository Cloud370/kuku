[package]
name = "kuku"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "File-native agent runtime SDK"

[dependencies]
home = "0.5.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
time = { version = "0.3", default-features = false, features = ["std", "formatting"] }
tokio = { version = "1", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"
httpmock = "0.7"
