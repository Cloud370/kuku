[package]
name = "kuku"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "File-native agent runtime SDK"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "time"] }

[dev-dependencies]
tempfile = "3"
